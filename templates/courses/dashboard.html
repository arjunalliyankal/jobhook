{% extends "base.html" %}

{% block title %}Courses — JobHook{% endblock %}

{% block extra_css %}
<style>
    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
        gap: 1rem;
    }

    .page-header h1 {
        margin-bottom: 0.2rem;
    }

    .page-header p {
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    /* ── Toolbar ─────────────────────────────────────────────── */
    .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
        margin-bottom: 1.25rem;
    }

    .toolbar input[type="text"] {
        flex: 1;
        min-width: 220px;
        max-width: 360px;
        padding: 0.65rem 1rem;
    }

    .platform-pills {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
    }

    .pill {
        padding: 0.35rem 0.85rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-muted);
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    .pill:hover {
        border-color: var(--primary);
        color: var(--text-main);
    }

    .pill.active {
        background: var(--primary-light);
        border-color: var(--primary);
        color: var(--primary-deep, #52796F);
    }

    /* ── Banner ──────────────────────────────────────────────── */
    #scrape-banner {
        display: none;
        align-items: center;
        gap: 0.75rem;
        padding: 0.85rem 1.25rem;
        border-radius: var(--radius-lg);
        background: var(--primary-light);
        border: 1px solid rgba(73, 105, 77, 0.3);
        margin-bottom: 1.25rem;
        font-size: 0.88rem;
        color: var(--primary-deep, #52796F);
    }

    #scrape-banner.active {
        display: flex;
    }

    .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(73, 105, 77, 0.3);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        flex-shrink: 0;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    /* ── Cards ───────────────────────────────────────────────── */
    #courses-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 1.25rem;
    }

    .course-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.4rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
        box-shadow: var(--shadow-sm);
    }

    .course-card:hover {
        border-color: var(--primary);
        transform: translateY(-3px);
        box-shadow: var(--shadow-hover);
    }

    .card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 0.5rem;
    }

    .card-title {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-main);
    }

    .card-provider {
        font-size: 0.83rem;
        color: var(--text-muted);
        font-weight: 500;
        margin-top: 0.15rem;
    }



    .course-img {
        width: 100%;
        height: 140px;
        object-fit: cover;
        border-radius: var(--radius);
        background: var(--accent, #CAD2C5);
    }

    .course-desc {
        font-size: 0.83rem;
        color: var(--text-muted);
        line-height: 1.55;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex: 1;
    }

    .card-actions {
        display: flex;
        gap: 0.5rem;
        margin-top: auto;
    }

    .card-actions .btn {
        flex: 1;
        padding: 0.5rem;
        font-size: 0.83rem;
        text-align: center;
        text-decoration: none;
    }

    .loading-skeleton {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {

        0%,
        100% {
            opacity: 1
        }

        50% {
            opacity: 0.35
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Course Search</h1>
        <p id="page-subtitle">Loading courses for your target role…</p>
    </div>
    <div style="display:flex;gap:0.6rem;flex-wrap:wrap;align-items:center;">
        <button id="saved-courses-btn" class="btn btn-outline" onclick="toggleSavedPanel()">🔖 Saved Courses <span
                id="saved-count"
                style="background:var(--primary);color:white;border-radius:999px;padding:0.1rem 0.5rem;font-size:0.75rem;margin-left:0.3rem;display:none;">0</span></button>
        <button id="scrape-btn" class="btn btn-primary">🌐 Find Courses</button>
    </div>
</div>

<!-- Saved Courses Panel -->
<div id="saved-courses-panel" style="display:none; margin-bottom:1.5rem;">
    <div class="card" style="padding:1.25rem;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
            <h3 style="margin:0;font-size:1rem;">🔖 Saved Courses</h3>
            <button class="btn btn-outline btn-sm" onclick="toggleSavedPanel()">✕ Close</button>
        </div>
        <div id="saved-courses-list"></div>
    </div>
</div>

<div id="scrape-banner">
    <div class="spinner"></div>
    <span id="scrape-banner-text">Fetching courses… Chrome may open for edX.</span>
</div>


<div id="courses-grid">
    <div class="loading-skeleton" style="height:200px;"></div>
    <div class="loading-skeleton" style="height:200px;"></div>
    <div class="loading-skeleton" style="height:200px;"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    requireAuth();

    let activePlatform = "all";

    function showSkeletons() {
        document.getElementById("courses-grid").innerHTML = `
        <div class="loading-skeleton" style="height:200px;"></div>
        <div class="loading-skeleton" style="height:200px;"></div>
        <div class="loading-skeleton" style="height:200px;"></div>`;
    }

    function renderCards(courses) {
        const grid = document.getElementById("courses-grid");
        if (!courses || !courses.length) {
            grid.innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted);">
            <div style="font-size:3rem;margin-bottom:1rem;">🔍</div>
            <p>No courses found. Click <strong>Find Courses</strong>.</p>
        </div>`;
            return;
        }

        // Randomize the courses array
        let shuffled = [...courses];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }

        grid.innerHTML = "";
        shuffled.forEach(c => {
            const title = c.title || c.name || "Untitled";
            const provider = c.provider || c.company || "";
            const desc = c.description || "";
            const link = c.link || "#";
            const platform = c.platform || "default";
            const thumb = c.thumbnail || null;

            const card = document.createElement("div");
            card.className = "course-card";
            card.innerHTML = `
        <div class="card-top">
            <div>
                <div class="card-title">${title}</div>
                <div class="card-provider">${provider}</div>
            </div>
        </div>
        ${thumb ? `<img src="${thumb}" class="course-img" alt="thumbnail" loading="lazy" />` : ""}
        ${desc ? `<p class="course-desc">${desc}</p>` : ""}
        <div class="card-actions">
            <button class="btn btn-primary" onclick="saveCourse('${c._id}', this)">🔖 Save</button>
            <a href="${link}" target="_blank" rel="noopener" class="btn btn-ghost">View ↗</a>
        </div>`;
            grid.appendChild(card);
        });
    }

    // ── Search saved DB ────────────────────────────────────────────────────────────
    async function loadCourses(query = "") {
        showSkeletons();
        try {
            const params = new URLSearchParams({ q: query, platform: activePlatform, limit: 30 });
            const res = await API.get(`/courses/search?${params}`);
            if (!res || !res.ok) throw new Error();
            renderCards(await res.json());
        } catch {
            document.getElementById("courses-grid").innerHTML =
                `<p style="color:var(--danger);grid-column:1/-1;">Error loading courses.</p>`;
        }
    }

    // ── Live Scrape ────────────────────────────────────────────────────────────────
    // currentRole is set from /auth/me on init — used by loadCourses & triggerScrape
    let currentRole = "";

    function showBanner(t) {
        document.getElementById("scrape-banner-text").textContent = t;
        document.getElementById("scrape-banner").classList.add("active");
    }
    function hideBanner() { document.getElementById("scrape-banner").classList.remove("active"); }

    async function triggerScrape() {
        const keyword = currentRole;
        const btn = document.getElementById("scrape-btn");
        btn.disabled = true; btn.textContent = "⏳ Fetching…";

        const platforms = ["edx", "youtube"];

        showBanner(`Fetching courses for "${keyword}" — Chrome may open briefly for edX…`);
        try {
            const res = await API.post("/courses/scrape", { keyword, platforms });
            const data = await res.json();
            hideBanner();
            if (data.courses && data.courses.length) {
                renderCards(data.courses);
                showToast(`✅ ${data.count} courses fetched!`);
            } else {
                showToast("No courses found for this role.", "info");
                loadCourses(keyword);
            }
        } catch {
            hideBanner();
            showToast("Scrape failed — see console.", "error");
        } finally {
            btn.disabled = false; btn.textContent = "🌐 Find Courses";
        }
    }

    // ── Save ───────────────────────────────────────────────────────────────────────
    let savedPanelOpen = false;

    async function saveCourse(id, btn) {
        if (!id || id === "undefined") { showToast("Cannot save — no ID.", "error"); return; }
        btn.disabled = true; btn.textContent = "Saving…";
        try {
            const res = await API.post("/courses/save", { course_id: id });
            if (res && res.ok) {
                showToast("Course saved! 🎉");
                btn.textContent = "✅ Saved";
                await refreshSavedCount();
                if (savedPanelOpen) await loadSavedCourses();
            } else {
                throw new Error();
            }
        } catch {
            showToast("Error saving.", "error");
            btn.disabled = false; btn.textContent = "🔖 Save";
        }
    }

    async function refreshSavedCount() {
        try {
            const res = await API.get("/courses/saved");
            if (!res || !res.ok) return;
            const courses = await res.json();
            const countEl = document.getElementById("saved-count");
            const n = courses.length;
            countEl.textContent = n;
            countEl.style.display = n > 0 ? "inline" : "none";
        } catch (_) { }
    }

    async function loadSavedCourses() {
        const listEl = document.getElementById("saved-courses-list");
        listEl.innerHTML = `<div style="color:var(--text-muted);font-size:0.9rem;padding:1rem 0;">Loading…</div>`;
        try {
            const res = await API.get("/courses/saved");
            if (!res || !res.ok) throw new Error();
            const courses = await res.json();
            if (!courses.length) {
                listEl.innerHTML = `<p style="color:var(--text-muted);text-align:center;padding:1.5rem;">No saved courses yet. Click 🔖 Save on any course card!</p>`;
                return;
            }
            listEl.innerHTML = "";
            courses.forEach(savedItem => {
                const c = savedItem.course || {};
                const title = c.title || c.name || "Unknown Course";
                const provider = c.provider || c.company || "";
                const desc = c.description || "";
                const link = c.link || "#";
                const platform = c.platform || "default";
                const thumb = c.thumbnail || null;

                const card = document.createElement("div");
                card.style.cssText = "border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;margin-bottom:0.75rem;background:var(--surface);display:flex;gap:1rem;align-items:flex-start;";
                card.innerHTML = `
                    ${thumb ? `<img src="${thumb}" style="width:100px;height:70px;object-fit:cover;border-radius:var(--radius);background:var(--darker);flex-shrink:0;" />` : `<div style="width:100px;height:70px;border-radius:var(--radius);background:var(--darker);flex-shrink:0;"></div>`}
                    <div style="flex:1;">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;margin-bottom:0.3rem;">
                            <div>
                                <div style="font-weight:700;font-size:0.95rem;color:var(--text-main);">${title}</div>
                                <div style="font-size:0.83rem;color:var(--text-muted);margin-top:0.15rem;">${provider}</div>
                            </div>
                            <button class="btn btn-danger btn-sm" onclick="removeSavedCourse('${savedItem._id}', this)" style="flex-shrink:0;">✕ Remove</button>
                        </div>
                        ${desc ? `<p style="font-size:0.83rem;color:var(--text-muted);margin:0.4rem 0;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${desc}</p>` : ""}
                        ${link && link !== "#" ? `<a href="${link}" target="_blank" class="btn btn-ghost" style="margin-top:0.4rem;display:inline-block;font-size:0.8rem;">View Course ↗</a>` : ""}
                    </div>
                `;
                listEl.appendChild(card);
            });
        } catch (e) {
            listEl.innerHTML = `<p style="color:var(--danger);">Error loading saved courses.</p>`;
        }
    }

    async function removeSavedCourse(savedId, btn) {
        btn.disabled = true;
        try {
            const res = await API.delete(`/courses/saved/${savedId}`);
            if (res && res.ok) {
                showToast("Course removed from saved.");
                await Promise.all([refreshSavedCount(), loadSavedCourses()]);
            } else {
                showToast("Failed to remove course.", "error");
                btn.disabled = false;
            }
        } catch (e) {
            showToast("Error removing course.", "error");
            btn.disabled = false;
        }
    }

    function toggleSavedPanel() {
        const panel = document.getElementById("saved-courses-panel");
        savedPanelOpen = !savedPanelOpen;
        panel.style.display = savedPanelOpen ? "block" : "none";
        if (savedPanelOpen) loadSavedCourses();
    }

    // ── Init ───────────────────────────────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", async () => {
        // Fetch the user's target role from the server
        try {
            const meRes = await API.get("/auth/me");
            if (meRes && meRes.ok) {
                const me = await meRes.json();
                // Assign to the outer-scoped currentRole so triggerScrape() picks it up
                currentRole = (me.profile || {}).target_role || "";
            }
        } catch (_) { }

        refreshSavedCount();

        if (currentRole) {
            document.getElementById("page-subtitle").textContent =
                `Showing courses for "${currentRole}" — your target role.`;
            loadCourses(currentRole);
        } else {
            document.getElementById("page-subtitle").textContent =
                "Set a target role in your profile to get personalized recommendations.";
            document.getElementById("courses-grid").innerHTML = `
                <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted);">
                    <div style="font-size:3rem;margin-bottom:1rem;">🎯</div>
                    <p>You haven't set a <strong>Target Role</strong> yet.</p>
                    <p style="font-size:0.88rem;margin-top:0.4rem;">Update it in your profile and we'll show personalized courses here.</p>
                    <a href="/dashboard" class="btn btn-primary" style="margin-top:1rem;">Set Target Role</a>
                </div>
            `;
        }

        // "Find Courses" button uses the target role to scrape fresh results
        document.getElementById("scrape-btn").addEventListener("click", () => {
            if (!currentRole) {
                showToast("Please set your target role in your profile first.", "info");
                return;
            }
            triggerScrape();
        });
    });
</script>
{% endblock %}
